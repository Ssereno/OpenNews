schema: spec-driven

context: |
  Tech Stack:Angular 17, TypeScript, Bootstrap,Angular Material for UI
  Constraints: Browser-only, localStorage for user preferences, Responsive design
  Code Conventions: Always use types; avoid `any`, Angular for all UI, Angular Material + Bootstrap 
  Naming: kebab-case files/folders, PascalCase classes, camelCase method params/locals, PascalCase constants
  Testing: E2E tests
  NewsAPI: https://newsapi.org/docs (authentication, everything, top-headlines, sources endpoints)

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then format for scenarios
    - Reference existing patterns before inventing new ones